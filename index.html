<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Florence 🌸</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#fff1f5,#ffe4ec);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* Decorative soft flowers */
body::before{
  content:"🌸";
  font-size:120px;
  position:absolute;
  top:-30px;
  left:-20px;
  opacity:0.15;
}

body::after{
  content:"🌺";
  font-size:120px;
  position:absolute;
  bottom:-30px;
  right:-20px;
  opacity:0.15;
}

.card{
  background:white;
  padding:60px 50px;
  border-radius:30px;
  width:90%;
  max-width:900px;
  box-shadow:0 25px 70px rgba(0,0,0,0.12);
  text-align:center;
}

h1{
  font-size:42px;
  color:#b91c1c;
  margin-bottom:15px;
}

p{
  font-size:18px;
  color:#7f1d1d;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 25px;
  border-radius:30px;
  border:none;
  background:#fda4af;
  color:white;
  font-size:14px;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  background:#f43f5e;
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(244,63,94,0.4);
}

.footer{
  margin-top:25px;
  font-size:13px;
  color:#9f1239;
}
</style>
</head>

<body>

<div class="card">
  <h1>Welcome to Florence 🌷</h1>
  <p>Your elegant AI flower assistant. Click the chat icon at the bottom right to begin.</p>

  <div class="buttons">
    <div class="btn">Store Hours</div>
    <div class="btn">Flower Recommendations</div>
    <div class="btn">AI Powered</div>
  </div>

  <div class="footer">
    Powered by IBM watsonx Assistant
  </div>
</div>

<!-- Watson Assistant Script -->
<script>
window.watsonAssistantChatOptions = {
  integrationID: "731a5732-b90a-48c3-9405-5a34f92f3264",
  region: "au-syd",
  serviceInstanceID: "6577cda5-2d34-4b5d-941a-5944fa25e2f",
  onLoad: async (instance) => { await instance.render(); }
};
setTimeout(function(){
  const t=document.createElement('script');
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
  (window.watsonAssistantChatOptions.clientVersion || 'latest') +
  "/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
});
</script>

</body>
</html>
