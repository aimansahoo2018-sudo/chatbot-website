<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>adorned. fierce. blooms. | floral atelier</title>
  <!-- elegant serif & sans-serif pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fef8f3 0%, #fceae3 100%);
      font-family: 'Work Sans', sans-serif;
      color: #2f2a27;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
      /* soft floral whisper background – pure css */
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 225, 210, 0.3) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(210, 170, 150, 0.2) 0%, transparent 40%);
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 250, 245, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 40px -12px rgba(90, 50, 35, 0.2),
                  inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 245, 235, 0.6);
      text-align: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 15vw, 6.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .word {
      display: block;
    }

    .word:nth-child(1) {
      color: #b16f5b;  /* warm terracotta */
      transform: translateX(-5px);
    }
    .word:nth-child(2) {
      color: #9d786a;  /* dusty rose */
      transform: translateX(3px);
    }
    .word:nth-child(3) {
      color: #6d4f43;  /* deep cacao */
      transform: translateX(-2px);
    }

    .subtitle {
      font-size: 1.4rem;
      font-weight: 300;
      color: #4a3d37;
      max-width: 600px;
      margin: 0 auto 2rem auto;
      border-bottom: 1px dashed #d9c0b4;
      padding-bottom: 1.2rem;
      line-height: 1.6;
    }

    .chat-prompt {
      display: inline-block;
      background: #f3e1d8;
      color: #4d342b;
      font-size: 1rem;
      font-weight: 400;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      margin-bottom: 2.8rem;
      box-shadow: 0 6px 14px rgba(140, 85, 65, 0.08);
      border: 1px solid #f1d6cb;
      backdrop-filter: blur(4px);
    }

    .chat-prompt span {
      font-size: 1.2rem;
      margin-left: 6px;
    }

    .button-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .btn {
      font-family: 'Work Sans', sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      text-decoration: none;
      transition: all 0.25s ease;
      border: 2px solid transparent;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px -6px rgba(100, 60, 40, 0.2);
    }

    .btn-primary {
      background: #b77863;
      color: white;
      border-color: #b77863;
    }

    .btn-primary:hover {
      background: #9b5f4b;
      border-color: #9b5f4b;
      transform: scale(1.02);
      box-shadow: 0 14px 24px -8px #b27a68;
    }

    .btn-secondary {
      background: transparent;
      border-color: #b77863;
      color: #b77863;
    }

    .btn-secondary:hover {
      background: #b77863;
      color: white;
      transform: scale(1.02);
    }

    .signature-note {
      font-size: 0.9rem;
      color: #a48d82;
      margin-top: 2rem;
      letter-spacing: 1px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .signature-note::before,
    .signature-note::after {
      content: "";
      display: block;
      width: 40px;
      height: 1px;
      background: #dcc5ba;
    }

    /* make sure watson assistant icon doesn't overlap content weirdly */
    @media (max-width: 600px) {
      .container {
        padding: 2rem 1.5rem;
      }
      .subtitle {
        font-size: 1.2rem;
      }
      .btn {
        font-size: 1rem;
        padding: 0.8rem 2rem;
        width: 100%;
        max-width: 280px;
      }
    }
  </style>

  <!-- ========== WATSON ASSISTANT CHATBOT SCRIPT (ACTIVE) ========== -->
  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "731a5732-b90a-48c3-9405-5a34f92f3264", // The ID of this integration.
      region: "au-syd", // The region your integration is hosted in.
      serviceInstanceID: "6577cda5-2d34-4b5d-941a-5944fa2e5e2f", // The ID of your service instance.
      onLoad: async (instance) => { await instance.render(); }
    };
    setTimeout(function(){
      const t=document.createElement('script');
      t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>
  <!-- ========== CHATBOT SCRIPT END ========== -->
</head>
<body>
  <div class="container">
    <h1>
      <span class="word">adorned.</span>
      <span class="word">fierce.</span>
      <span class="word">blooms.</span>
    </h1>

    <div class="subtitle">
      Elegant floral arrangements for daily moments and special events.
    </div>

    <div class="chat-prompt">
      💬 Need help choosing? Click the chat icon at the bottom-right to talk with our AI assistant 🎉
    </div>

    <div class="button-group">
      <a href="#" class="btn btn-primary">Order Flowers</a>
      <a href="#" class="btn btn-secondary">Wedding Collections</a>
    </div>

    <div class="signature-note">
      fresh from the greenhouse — crafted with intention
    </div>
  </div>

  <!-- subtle hint that chatbot is active (the script above injects the bubble) -->
  <!-- no extra code needed, watson assistant will appear as a floating icon -->
</body>
</html>
