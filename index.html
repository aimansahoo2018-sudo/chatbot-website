<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florence | Flower Assistant</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#fff1f2,#ffe4e6);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#7f1d1d;
}

.container{
  width:90%;
  max-width:900px;
  padding:60px;
  border-radius:25px;
  background:white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  text-align:center;
  position:relative;
}

h1{
  font-size:40px;
  margin-bottom:15px;
  color:#be123c;
}

p{
  font-size:18px;
  color:#9f1239;
  margin-bottom:35px;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 24px;
  border-radius:30px;
  border:none;
  background:#fda4af;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#f43f5e;
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(244,63,94,0.4);
}

.flower-left{
  position:absolute;
  top:-40px;
  left:-40px;
  font-size:80px;
  opacity:0.2;
}

.flower-right{
  position:absolute;
  bottom:-40px;
  right:-40px;
  font-size:80px;
  opacity:0.2;
}

.footer{
  margin-top:30px;
  font-size:13px;
  color:#9f1239;
}
</style>
</head>

<body>

<div class="container">
  <div class="flower-left">🌸</div>
  <div class="flower-right">🌺</div>

  <h1>Welcome to Florence 🌷</h1>
  <p>Your elegant AI flower assistant.  
     Click the chat icon at the bottom right to begin.</p>

  <div class="buttons">
    <div class="btn">Store Hours</div>
    <div class="btn">Flower Recommendations</div>
    <div class="btn">AI Powered</div>
  </div>

  <div class="footer">
    Powered by IBM watsonx Assistant
  </div>
</div>

<!-- Watson Chat Script -->

<script>
window.watsonAssistantChatOptions = {
  integrationID: "731a5732-b90a-48c3-9405-5a34f92f3264",
  region: "au-syd",
  serviceInstanceID: "6577cda5-2d34-4b5d-941a-5944fa25e2f",
  onLoad: async (instance) => { await instance.render(); }
};
setTimeout(function(){
  const t=document.createElement('script');
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
  (window.watsonAssistantChatOptions.clientVersion || 'latest') +
  "/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
});
</script>

</body>
</html>
